<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <!-- 🌟 GitHub Pages 하위 경로 404 에러 방지용 스크립트 -->
    <script>
        var path = window.location.pathname;
        if (!path.endsWith('/') && path.indexOf('.html') === -1) {
            window.location.replace(window.location.href.split('?')[0] + '/');
        }
    </script>

    <!-- 1. PWA/모바일 최적화 (화면 확대 방지 및 앱 형태 구동) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 2. 아이콘 및 매니페스트 -->
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <!-- 🌟 [한글 깨짐 해결] 구글 웹 폰트(Noto Sans KR) 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- 타이틀을 프로젝트에 맞게 수정 -->
    <title>연구실 자재관리</title>

    <!-- 3. Compose WasmJs 진입 스크립트 -->
    <script type="application/javascript" src="composeApp.js"></script>

    <!-- 4. Compose Web 캔버스 최적화 스타일 -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F3F4F6;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        canvas {
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>
<canvas id="ComposeTarget"></canvas>
</body>
</html>
